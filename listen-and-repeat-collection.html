.stat-num { font-size: 2rem; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px; }

.filter-btn { padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px; background: var(--card-bg); cursor: pointer; font-size: 0.9rem; transition: all 0.2s; color: var(--text-secondary); }
.filter-btn:hover, .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

.topic-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; overflow: hidden; transition: box-shadow 0.2s; }

.topic-title { font-weight: 600; font-size: 1.05rem; color: var(--heading); }

.topic-card.open .topic-arrow { transform: rotate(180deg); }

.topic-body { display: none; padding: 0 20px 20px; border-top: 1px solid var(--border); }
.topic-card.open .topic-body { display: block; }

.sentences { margin: 16px 0; }

.vocab-en { font-weight: 600; color: var(--heading); }
.vocab-phonetic { color: var(--text-secondary); font-style: italic; }
.vocab-cn { color: var(--text-secondary); }

/* Footer */

}

// ===== RENDER =====
const catNames = { cat1: "🏫 校园行政办事", cat2: "🌿 手工园艺户外", cat3: "🍳 美食制作", cat4: "🎨 装修绘画艺术", cat5: "🏪 商业休闲" };
let currentCat = "all";

function buildAudioHTML(t) {
  if (!t.hasAudio) {
    return '<div class="no-audio">⚠️ 此话题暂未收录音频（文章未附带或仅文字版）</div>';
  }
  if (t.audioUrl) {
    // Have direct audio URL from hanginthere.cn
    let html = '<div class="audio-player"><span class="audio-label">🎧 完整音频</span><audio controls controlsList="nodownload"><source src="'+t.audioUrl+'" type="audio/mpeg"></audio></div>';
    if (t.segments) {
      html += '<div style="margin-top:8px;font-size:0.8rem;color:var(--text-secondary)">⏱ 点击句子旁 ▶ 可播放对应片段</div>';
    }
    return html;
  }
  return '<div class="audio-player"><span class="audio-label">🎧 有AI音频</span><span style="font-size:0.85rem;color:var(--text-secondary)">公众号文章内含 AI 生成音频，请在微信中打开原文跟练</span></div>';
}

function buildSentencesHTML(t) {
  let html = '<div class="sentences">';
  t.sentences.forEach((s, i) => {
    html += '<div class="sentence">';
    html += '<span class="sentence-num">'+(i+1)+'</span>';
    if (t.audioUrl && t.segments && t.segments[i]) {
      let start = t.segments[i].t;
      let end = t.segments[i].e;
      html += '<span class="sentence-text">'+s+' <button onclick="playSegment(\''+t.audioUrl+'\','+start+','+end+',this)" style="background:none;border:none;cursor:pointer;font-size:0.9rem;padding:2px 6px;border-radius:4px;color:var(--accent)" title="播放此句">▶</button></span>';
    } else {
      html += '<span class="sentence-text">'+s+'</span>';
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function buildVocabHTML(t) {
  if (!t.vocab || t.vocab.length === 0) return '';
  let items = t.vocab.map(v => {
    let en = v[0], phonetic = v[1] || '', cn = v[2] || '';
    return '<div class="vocab-item"><span class="vocab-en">'+en+'</span>'+(phonetic?' <span class="vocab-phonetic">'+phonetic+'</span>':'')+' <span class="vocab-cn">'+cn+'</span></div>';
  }).join('');
  return '<div class="vocab-section"><span class="vocab-toggle" onclick="toggleVocab(this)">📖 展开词汇表 ('+t.vocab.length+'词)</span><div class="vocab-list">'+items+'</div></div>';
}

function buildCard(t) {
  let catLabel = catNames[t.cat] || "";
  let audioBadge = t.hasAudio ? '<span class="badge badge-audio">🔊 有音频</span>' : '<span class="badge badge-no-audio">📄 仅文字</span>';
  let idLabel = typeof t.id === 'string' ? '#'+t.id.replace('b','')+'b' : '#'+t.id;
  return '<div class="topic-card" data-cat="'+t.cat+'" data-has-audio="'+t.hasAudio+'" data-id="'+t.id+'">'+
    '<div class="topic-header" onclick="toggleTopic(this)">'+
      '<span class="topic-number">'+idLabel+'</span>'+
      '<div class="topic-info">'+
        '<div class="topic-title">'+t.title+'</div>'+
        '<div class="topic-date">📅 '+t.date+'</div>'+
      '</div>'+
      '<div class="topic-badges">'+
        audioBadge+
        '<span class="badge badge-cat">'+catLabel+'</span>'+
      '</div>'+
      '<span class="topic-arrow">▾</span>'+
    '</div>'+
    '<div class="topic-body">'+
      buildAudioHTML(t)+
      buildSentencesHTML(t)+
      buildVocabHTML(t)+
    '</div>'+
  '</div>';
}

function renderAll() {
  let html = '';
  topics.forEach(t => { html += buildCard(t); });
  document.getElementById('topicList').innerHTML = html;
  updateStats();
}

function updateStats() {
  let visible = document.querySelectorAll('.topic-card:not([style*="display: none"])');
  let all = topics.length;
  let withAudio = topics.filter(t => t.hasAudio).length;
  let textOnly = all - withAudio;
  let totalSentences = topics.reduce((sum, t) => sum + (t.sentences ? t.sentences.filter(s => s.indexOf('⚠️') === -1).length : 0), 0);
  document.getElementById('count-all').textContent = all;
  document.getElementById('count-audio').textContent = withAudio;
  document.getElementById('count-text').textContent = textOnly;
  document.getElementById('count-sentences').textContent = totalSentences;
}

function toggleTopic(header) {
  header.parentElement.classList.toggle('open');
}

function toggleVocab(el) {
  let list = el.nextElementSibling;
  list.classList.toggle('show');
  el.textContent = list.classList.contains('show') ? '📖 收起词汇表' : el.textContent.replace('收起', '展开');
}

function filterByCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  let cards = document.querySelectorAll('.topic-card');
  cards.forEach(c => {
    if (cat === 'all' || c.dataset.cat === cat) {
      c.style.display = '';
    } else {
      c.style.display = 'none';
    }
  });
  filterTopics(); // also apply search
}

function filterTopics() {
  let query = document.getElementById('searchBox').value.toLowerCase().trim();
  let cards = document.querySelectorAll('.topic-card');
  let found = false;
  cards.forEach(c => {
    // Check category filter
    if (currentCat !== 'all' && c.dataset.cat !== currentCat) {
      c.style.display = 'none';
      return;
    }
    if (!query) { c.style.display = ''; found = true; return; }
    let cardText = c.textContent.toLowerCase();
    if (cardText.includes(query)) { c.style.display = ''; found = true; }
    else { c.style.display = 'none'; }
  });
  document.getElementById('noResults').classList.toggle('show', !found);
  updateStats();
}

// Audio segment player (for hanginthere.cn audio)
let currentAudio = null;
function playSegment(url, start, end, btn) {
  if (currentAudio) { currentAudio.pause(); }
  currentAudio = new Audio(url);
  currentAudio.currentTime = start;
  currentAudio.play();
  // Stop at end time
  let stopTimer = setInterval(() => {
    if (currentAudio.currentTime >= end) {
      currentAudio.pause();
      clearInterval(stopTimer);
    }
  }, 100);
  // Update button visual
  btn.textContent = '⏸';
  currentAudio.onended = () => { btn.textContent = '▶'; currentAudio = null; };
  currentAudio.onpause = () => { btn.textContent = '▶'; };
  // Prevent multiple clicks
  if (currentAudio._oldCleanup) currentAudio._oldCleanup();
  currentAudio._oldCleanup = () => { clearInterval(stopTimer); };
}

renderAll();
</script>
